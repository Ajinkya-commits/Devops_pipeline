name: Ci pipeline

on:
  push:
    branches: [main]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: setup nodejs
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: install dependencies
        run: npm install

      - name: run tests
        run: npm test